name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx ng test --watch=false
      - run: npx ng build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t todolist-backend ./Backend
      - name: Build frontend image
        run: docker build -t todolist-frontend ./frontend

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: todolist
          POSTGRES_USER: todolist
          POSTGRES_PASSWORD: todolist
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todolist -d todolist"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: Backend/pom.xml

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Build backend jar
        working-directory: Backend
        run: ./mvnw -B -DskipTests package

      - name: Start backend and wait for readiness
        working-directory: Backend
        env:
          JWT_SECRET: ci-only-throwaway-secret-never-used-outside-this-run
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/todolist
          SPRING_DATASOURCE_USERNAME: todolist
          SPRING_DATASOURCE_PASSWORD: todolist
        run: |
          nohup java -jar target/*.jar > backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/v3/api-docs > /dev/null && exit 0
            sleep 2
          done
          echo "Le backend n'a pas démarré à temps"; cat backend.log; exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start frontend and wait for readiness
        working-directory: frontend
        run: |
          nohup npx ng serve > frontend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4200 > /dev/null && exit 0
            sleep 2
          done
          echo "Le frontend n'a pas démarré à temps"; cat frontend.log; exit 1

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
