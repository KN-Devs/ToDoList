<div class="auth-page">
  <form class="auth-card" (ngSubmit)="submit()">
    <h1>Créer un compte</h1>

    <label>
      Nom
      <input
        type="text"
        name="nom"
        [(ngModel)]="nom"
        required
        maxlength="40"
        autocomplete="family-name"
      />
    </label>

    <label>
      Prénom
      <input
        type="text"
        name="prenom"
        [(ngModel)]="prenom"
        required
        maxlength="40"
        autocomplete="given-name"
      />
    </label>

    <label>
      Email
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        required
        maxlength="100"
        autocomplete="email"
      />
    </label>

    <label>
      Mot de passe
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        required
        minlength="8"
        pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).+$"
        autocomplete="new-password"
      />
      <span class="hint">Au moins 8 caractères, une majuscule, un chiffre et un caractère spécial.</span>
    </label>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Création...' : 'Créer mon compte' }}
    </button>

    <p class="switch">
      Déjà un compte ?
      <a routerLink="/login">Se connecter</a>
    </p>
  </form>
</div>
