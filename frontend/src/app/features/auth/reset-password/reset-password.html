<div class="auth-page">
  @if (success()) {
    <div class="auth-card">
      <h1>Mot de passe modifié</h1>
      <p class="modal-description">Ton mot de passe a bien été mis à jour.</p>
      <button type="button" (click)="goToLogin()">Se connecter</button>
    </div>
  } @else {
    <form class="auth-card" (ngSubmit)="submit()">
      <h1>Nouveau mot de passe</h1>

      <label>
        Nouveau mot de passe
        <input
          type="password"
          name="newPassword"
          [(ngModel)]="newPassword"
          required
          minlength="8"
          pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).+$"
          autocomplete="new-password"
          [disabled]="!token()"
        />
        <span class="hint">Au moins 8 caractères, une majuscule, un chiffre et un caractère spécial.</span>
      </label>

      @if (errorMessage()) {
        <p class="error">{{ errorMessage() }}</p>
      }

      <button type="submit" [disabled]="loading() || !token()">
        {{ loading() ? 'Envoi...' : 'Réinitialiser le mot de passe' }}
      </button>

      <p class="switch">
        <a routerLink="/login">Retour à la connexion</a>
      </p>
    </form>
  }
</div>
