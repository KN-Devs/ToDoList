spring.application.name=portfolio
spring.datasource.url=jdbc:postgresql://localhost:5432/todolist
spring.datasource.username=todolist
spring.datasource.password=todolist
spring.jpa.hibernate.ddl-auto=validate

# Access token JWT de courte durée (15 min) : un refresh token (30 jours,
# révocable côté serveur) permet d'en obtenir un nouveau sans reconnexion.
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=900000

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Envoi d'email désactivé par défaut (tests, environnements sans configuration
# SMTP) ; activé explicitement via MAIL_ENABLED en local et en production.
mail.enabled=${MAIL_ENABLED:false}
# Référence directement la variable d'environnement MAIL_USERNAME (et non la
# propriété spring.mail.username ci-dessous) : celle-ci est TOUJOURS définie,
# ne serait-ce qu'à une chaîne vide via ${MAIL_USERNAME:}, donc chaîner le
# repli dessus ne retombe jamais sur la valeur par défaut ci-après quand
# MAIL_FROM et MAIL_USERNAME sont tous deux absents (incident constaté en
# production : adresse d'expéditeur vide, envoi systématiquement en échec).
mail.from=${MAIL_FROM:${MAIL_USERNAME:noreply@todolist.app}}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Pièces jointes des tâches : 5 Mo max par fichier (même limite appliquée
# côté service dans TaskAttachmentService, ce réglage évite qu'une requête
# trop volumineuse n'atteigne même le contrôleur).
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Observabilité : /actuator/health reste public (sondes de vie/disponibilité
# de Render ou d'un load balancer) ; les autres endpoints (metrics, prometheus,
# info, détail du health) sont réservés au rôle ADMIN, voir SecurityConfig.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
management.info.env.enabled=true
# Histogramme nécessaire au calcul de percentiles (ex: p95) sur la latence
# des requêtes HTTP côté Prometheus/Grafana (histogram_quantile).
management.metrics.distribution.percentiles-histogram.http.server.requests=true
# Le health indicator par défaut de Spring Mail teste une vraie connexion SMTP
# à chaque appel : hors de propos pour la disponibilité de l'application, et
# source de faux négatifs (réseau, quota SMTP) quand l'envoi d'email est de
# toute façon désactivé (mail.enabled=false) en local et dans certains
# environnements.
management.health.mail.enabled=false
# Jeton statique dédié au scraping Prometheus de /actuator/prometheus
# (Authorization: Bearer <jeton>), désactivé par défaut. Un scraper
# automatisé ne peut pas gérer un access token JWT expirant toutes les 15
# minutes comme un ADMIN humain ; utilisé uniquement pour la démo locale
# Prometheus/Grafana, voir docker-compose.observability.yml. Les comptes
# ADMIN continuent d'accéder à cet endpoint normalement par JWT, sans ce
# jeton.
metrics.scrape-token=${METRICS_SCRAPE_TOKEN:}

# Identifiant de corrélation (CorrelationIdFilter) visible dans les logs
# texte classiques ; repris automatiquement comme champ à part entière par
# les formats structurés (voir logging.structured.format.console, activé en
# production via la variable d'environnement LOGGING_STRUCTURED_FORMAT_CONSOLE).
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{requestId}] %logger{36} - %msg%n
