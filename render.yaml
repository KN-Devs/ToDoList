databases:
  - name: todolist-db
    plan: free
    databaseName: todolist
    user: todolist

services:
  - type: web
    name: todolist-backend
    runtime: docker
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    plan: free
    healthCheckPath: /v3/api-docs
    envVars:
      # Généré avec `openssl rand -base64 64`, à saisir manuellement dans le
      # dashboard Render (jamais stocké dans ce fichier ni dans le dépôt).
      - key: JWT_SECRET
        sync: false
      # URL du frontend une fois déployé, ex: https://todolist-frontend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: todolist-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: todolist-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: todolist-db
          property: password

  - type: web
    name: todolist-frontend
    runtime: static
    rootDir: frontend
    # API_BASE_URL est injectée dans le bundle au moment du build (voir
    # DEPLOYMENT.md) : Angular n'a pas de mécanisme natif de variable
    # d'environnement lisible au runtime pour un site statique.
    buildCommand: sed -i "s#http://localhost:8080/api#$API_BASE_URL#" src/app/core/config/api.config.ts && npm ci && npx ng build
    staticPublishPath: dist/frontend/browser
    envVars:
      # URL du backend une fois déployé, ex: https://todolist-backend.onrender.com/api
      - key: API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
